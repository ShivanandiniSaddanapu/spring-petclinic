name: Java-workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    name: my-spc
    runs-on: ubuntu-latest

    steps:
      - name: Gitcheckout
        uses: actions/checkout@v4

      - name: Build java with maven
        run: mvn package

      - name: Build and Sonar Scan
        run: mvn clean verify sonar:sonar -Dsonar.projectKey=shivanandinisaddanapu -Dsonar.organization=ShivanandiniSaddanapu -DSONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
       
       
       
       
       
        